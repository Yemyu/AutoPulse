<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoPulse · 项目概览</title>
  <link rel="stylesheet" href="static/css/style.css">
  <!-- 防 FOUC：在 i18n.js 下载/执行前，浏览器可能先把服务端渲染的中文默认文案画出来，
     视频录制会抓到“中文一闪”。先把带 data-i18n 的元素隐藏，FOUC 应用完语言后再显示。 -->
  <style>[data-i18n]{visibility:hidden}</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">AutoPulse</div>
    <div class="brand-sub" data-i18n="brand_sub">汽车销量预测与用户舆情分析</div>
    <div class="top-actions">
      <button id="langSwitch" class="lang-switch" data-i18n="lang_btn">English</button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_analysis">分析</div>
        <a href="index.html" class="active" data-i18n="nav_overview">项目概览</a>
        <a href="forecast.html" data-i18n="nav_forecast">销量预测</a>
        <a href="absa.html" data-i18n="nav_absa">舆情 ABSA</a>
        <a href="attribution.html" data-i18n="nav_attribution">销量归因</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_relation">关系</div>
        <a href="relation.html" data-i18n="nav_relation">舆情↔销量</a>
        <a href="alerts.html" data-i18n="nav_alerts">舆情预警</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_drilldown">钻取</div>
        <a href="drilldown.html" data-i18n="nav_drilldown">钻取分析</a>
      </div>
    </nav>

    <main class="content">
      <div class="page-head">
        <h1 data-i18n="ov_title">项目概览</h1>
        
<p class="lead-text" data-i18n="ov_lead">AutoPulse 将汽车月度销量数据与懂车帝用户口碑进行对齐，系统评估舆情对销量预测与归因的价值。</p>

      </div>
      
  <div class="kpi-grid">
    <div class="kpi">
      <div><span class="kpi-val" id="kpi-coverage">-</span><span class="kpi-unit" data-i18n="ov_unit_series">车系</span></div>
      <div class="kpi-label" data-i18n="ov_kpi_coverage">覆盖车系</div>
    </div>
    <div class="kpi">
      <div><span class="kpi-val" id="kpi-wmape">-</span><span class="kpi-unit">%</span></div>
      <div class="kpi-label" data-i18n="ov_kpi_forecast">预测 WMAPE</div>
    </div>
    <div class="kpi">
      <div><span class="kpi-val" id="kpi-horizon">-</span><span class="kpi-unit" data-i18n="ov_unit_horizon">月</span></div>
      <div class="kpi-label" data-i18n="ov_kpi_horizon">预测区间</div>
    </div>
    <div class="kpi">
      <div><span class="kpi-val" id="kpi-alerts">-</span><span class="kpi-unit" data-i18n="ov_unit_alert">条</span></div>
      <div class="kpi-label" data-i18n="ov_kpi_alerts">舆情预警</div>
    </div>
    <div class="kpi">
      <div><span class="kpi-val" id="kpi-brands">-</span><span class="kpi-unit" data-i18n="ov_unit_brand">个</span></div>
      <div class="kpi-label" data-i18n="ov_kpi_brands">覆盖品牌</div>
    </div>
    <div class="kpi">
      <div><span class="kpi-val" id="kpi-reviews">-</span><span class="kpi-unit" data-i18n="ov_unit_review">条</span></div>
      <div class="kpi-label" data-i18n="ov_kpi_reviews">评论样本</div>
    </div>
  </div>

  <div class="card">
    <h3 data-i18n="ov_stage_flow">阶段流程</h3>
    <div class="stage-flow" id="stageFlow"></div>
  </div>

  <div class="card">
    <h3 data-i18n="ov_monthly_trend">全市场月度销量走势</h3>
    <div id="chartTrend" class="chart"></div>
  </div>

  <div class="card conclusion-card">
    <h3 data-i18n="ov_key_findings">核心发现</h3>
    <ul class="findings-list" id="findings"></ul>
  </div>

    </main>
  </div>

  <script src="static/js/lib/echarts.min.js"></script>
  <script src="static/js/theme.js"></script>
  <script src="static/js/common.js"></script>
  <script src="static/js/i18n.js"></script>
  <!-- 在首屏绘制前同步应用语言，避免服务端渲染的中文默认文案先闪现再被 JS 替换（FOUC）。
     中文版 zh→zh 为恒等式，无任何视觉变化；英文版绘制前即为英文，切换无卡顿。
     应用完成后再显示 [data-i18n] 元素，彻底消除加载阶段的中文闪烁。 -->
  <script>
    try { window.I18N && window.I18N.apply(); } catch (e) {}
    document.querySelectorAll("[data-i18n]").forEach(function (el) { el.style.visibility = "visible"; });
  </script>
  
<script>
loadJSON('overview').then(function (d) {
  document.getElementById('kpi-coverage').textContent = d.kpis.coverage_series;
  document.getElementById('kpi-wmape').textContent = d.kpis.forecast_wmape;
  document.getElementById('kpi-horizon').textContent = d.kpis.forecast_horizon;
  document.getElementById('kpi-alerts').textContent = d.kpis.alert_count;
  document.getElementById('kpi-brands').textContent = d.kpis.brand_count;
  document.getElementById('kpi-reviews').textContent = d.kpis.review_count ? d.kpis.review_count.toLocaleString() : '-';

  if (d.monthly_trend && d.monthly_trend.length) {
    var chart = initChart('chartTrend');
    chart.setOption({
      tooltip: tooltipStyle(),
      grid: baseGrid({ top: 24, bottom: 40 }),
      xAxis: Object.assign({ type: 'category', data: d.monthly_trend.map(function(x){return x.month;}), axisLabel: { interval: Math.floor(d.monthly_trend.length/8) } }, axisStyle()),
      yAxis: Object.assign({ type: 'value' }, axisStyle()),
      series: [{ type: 'line', data: d.monthly_trend.map(function(x){return x.sales;}), smooth: true, itemStyle: { color: window.AUTOPULSE.primary }, areaStyle: { color: 'rgba(44,123,229,.12)' } }]
    });
  }

  var flow = document.getElementById('stageFlow');
  flow.innerHTML = '';
  d.stages.forEach(function (s) {
    var cls = 'stage ' + (s.status === 'done' ? 'done' : (s.status === 'current' ? 'current' : ''));
    var div = document.createElement('div');
    div.className = cls;
    div.innerHTML = '<div class="stage-no">Stage ' + s.id + '</div>' +
                    '<div class="stage-name">' + s.name + '</div>' +
                    '<div class="stage-en">' + s.en + '</div>';
    flow.appendChild(div);
  });

  var list = document.getElementById('findings');
  list.innerHTML = '';
    d.findings.forEach(function (f) {
      var li = document.createElement('li');
      li.textContent = window.AUTOPULSE.lang === 'en' ? f.en : f.zh;
      list.appendChild(li);
    });

  document.addEventListener('i18nChanged', function () {
    list.innerHTML = '';
    d.findings.forEach(function (f) {
      var li = document.createElement('li');
      li.textContent = window.AUTOPULSE.lang === 'en' ? f.en : f.zh;
      list.appendChild(li);
    });
  });
});
</script>

</body>
</html>
