<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoPulse · 舆情预警</title>
  <link rel="stylesheet" href="static/css/style.css">
  <!-- 防 FOUC：在 i18n.js 下载/执行前，浏览器可能先把服务端渲染的中文默认文案画出来，
     视频录制会抓到“中文一闪”。先把带 data-i18n 的元素隐藏，FOUC 应用完语言后再显示。 -->
  <style>[data-i18n]{visibility:hidden}</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">AutoPulse</div>
    <div class="brand-sub" data-i18n="brand_sub">汽车销量预测与用户舆情分析</div>
    <div class="top-actions">
      <button id="langSwitch" class="lang-switch" data-i18n="lang_btn">English</button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_analysis">分析</div>
        <a href="index.html" data-i18n="nav_overview">项目概览</a>
        <a href="forecast.html" data-i18n="nav_forecast">销量预测</a>
        <a href="absa.html" data-i18n="nav_absa">舆情 ABSA</a>
        <a href="attribution.html" data-i18n="nav_attribution">销量归因</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_relation">关系</div>
        <a href="relation.html" data-i18n="nav_relation">舆情↔销量</a>
        <a href="alerts.html" class="active" data-i18n="nav_alerts">舆情预警</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_drilldown">钻取</div>
        <a href="drilldown.html" data-i18n="nav_drilldown">钻取分析</a>
      </div>
    </nav>

    <main class="content">
      <div class="page-head">
        <h1 data-i18n="al_title">舆情预警</h1>
        
<p class="lead-text" data-i18n="al_lead">基于规则识别口碑明显恶化的车系，作为声誉风险监测入口。</p>

      </div>
      
  <p class="conclusion" id="al-concl"></p>
  <p class="source" style="margin:0 0 14px;border:none;padding:0;" id="al-rule-text"></p>

  <div class="grid-2">
    <div class="card">
      <h3 data-i18n="al_trend">预警月度趋势</h3>
      <p class="insight" data-i18n="al_trend_insight">趋势图定位口碑危机集中爆发的月份，帮助判断是偶发事件还是系统性恶化。</p>
      <div id="chartTrend" class="chart"></div>
    </div>
    <div class="card">
      <h3 data-i18n="al_risk">风险等级分布</h3>
      <p class="insight" data-i18n="al_risk_insight">按综合情感分把预警划分为高/中/低三档，优先关注高危车系。</p>
      <div id="chartRisk" class="chart"></div>
    </div>
  </div>

  <div class="card">
    <h3 data-i18n="al_list">预警车系列表</h3>
    <p class="insight" data-i18n="al_list_insight">明细列出触发规则的具体车系、月份与情感变化，可直接用于运营侧跟进。</p>
    <div class="tbl-wrap">
      <table class="tbl" id="alertTbl">
        <thead>
          <tr>
            <th data-i18n="al_tbl_brand">品牌</th>
            <th data-i18n="al_tbl_series">车系</th>
            <th data-i18n="al_tbl_period">月份</th>
            <th data-i18n="al_tbl_overall">综合情感</th>
            <th data-i18n="al_tbl_drop">环比下降</th>
          </tr>
        </thead>
        <tbody id="alertBody"></tbody>
      </table>
    </div>
    <p class="source" data-i18n="al_source"></p>
  </div>

    </main>
  </div>

  <script src="static/js/lib/echarts.min.js"></script>
  <script src="static/js/theme.js"></script>
  <script src="static/js/common.js"></script>
  <script src="static/js/i18n.js"></script>
  <!-- 在首屏绘制前同步应用语言，避免服务端渲染的中文默认文案先闪现再被 JS 替换（FOUC）。
     中文版 zh→zh 为恒等式，无任何视觉变化；英文版绘制前即为英文，切换无卡顿。
     应用完成后再显示 [data-i18n] 元素，彻底消除加载阶段的中文闪烁。 -->
  <script>
    try { window.I18N && window.I18N.apply(); } catch (e) {}
    document.querySelectorAll("[data-i18n]").forEach(function (el) { el.style.visibility = "visible"; });
  </script>
  
<script>
var T = window.AUTOPULSE;
var chartTrend, chartRisk;

function renderAlerts() {
  loadJSON('alerts').then(function (d) {
    document.getElementById('al-concl').textContent = d.conclusion[window.AUTOPULSE.lang] || d.conclusion.zh;
    document.getElementById('al-rule-text').textContent = d.rule[window.AUTOPULSE.lang] || d.rule.zh;

    if (!chartTrend) chartTrend = initChart('chartTrend');
    chartTrend.setOption({
      tooltip: tooltipStyle(),
      grid: baseGrid({ top: 48 }),
      xAxis: Object.assign({ type: 'category', data: d.monthly.map(function (x) { return x.month; }) }, axisStyle()),
      yAxis: Object.assign({ type: 'value', minInterval: 1 }, axisStyle()),
      series: [{
        type: 'line',
        data: d.monthly.map(function (x) { return x.count; }),
        itemStyle: { color: T.warn },
        areaStyle: { color: 'rgba(246,195,67,.18)' },
        smooth: true,
        markPoint: { data: [{ type: 'max', name: 'max' }], symbolOffset: [0, 10] }
      }]
    }, true);

    var riskMap = { '高危': T.sentimentNeg, '中危': T.warn, '低危': T.sentimentPos,
                  'High': T.sentimentNeg, 'Medium': T.warn, 'Low': T.sentimentPos };
    var riskLabel = {'高危': 'al_risk_high', '中危': 'al_risk_mid', '低危': 'al_risk_low'};
    if (!chartRisk) chartRisk = initChart('chartRisk');
    chartRisk.setOption({
      tooltip: { trigger: 'item' },
      legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: T.muted } },
      series: [{
        type: 'pie',
        radius: ['42%', '68%'],
        center: ['38%', '55%'],
        data: d.risk_dist.map(function (x) {
          return { name: window.I18N.get(riskLabel[x.level] || x.level), value: x.count, itemStyle: { color: riskMap[x.level] || T.palette[0] } };
        }),
        label: { color: T.text, formatter: '{b}\n{c} ({d}%)' }
      }]
    }, true);

    var tbody = document.getElementById('alertBody');
    tbody.innerHTML = '';
    d.alerts.forEach(function (a) {
      var tr = document.createElement('tr');
      var brandDisplay = (window.AUTOPULSE.lang === 'en' && a.brand_en) ? a.brand_en : a.brand;
      var seriesDisplay = (window.AUTOPULSE.lang === 'en' && a.series_en) ? a.series_en : a.series_name;
      tr.innerHTML = '<td>' + brandDisplay + '</td>' +
                     '<td>' + seriesDisplay + '</td>' +
                     '<td>' + a.period + '</td>' +
                     '<td>' + a.overall.toFixed(2) + '</td>' +
                     '<td class="neg">' + a.overall_drop.toFixed(2) + '</td>';
      tbody.appendChild(tr);
    });
  });
}
renderAlerts();
window.__renderers.renderAlerts = renderAlerts;
</script>

</body>
</html>
