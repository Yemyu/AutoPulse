<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoPulse</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">AutoPulse</div>
    <div class="brand-sub" data-i18n="brand_sub">汽车销量预测与用户舆情分析</div>
    <div class="top-actions">
      <button id="langSwitch" class="lang-switch" data-i18n="lang_btn">English</button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_analysis">分析</div>
        <a href="/" class="{{ 'active' if active=='overview' }}" data-i18n="nav_overview">项目概览</a>
        <a href="/forecast" class="{{ 'active' if active=='forecast' }}" data-i18n="nav_forecast">销量预测</a>
        <a href="/absa" class="{{ 'active' if active=='absa' }}" data-i18n="nav_absa">舆情 ABSA</a>
        <a href="/attribution" class="{{ 'active' if active=='attribution' }}" data-i18n="nav_attribution">销量归因</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_relation">关系</div>
        <a href="/relation" class="{{ 'active' if active=='relation' }}" data-i18n="nav_relation">舆情↔销量</a>
        <a href="/alerts" class="{{ 'active' if active=='alerts' }}" data-i18n="nav_alerts">舆情预警</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav_group_drilldown">钻取</div>
        <a href="/drilldown" class="{{ 'active' if active=='drilldown' }}" data-i18n="nav_drilldown">钻取分析</a>
      </div>
    </nav>

    <main class="content">
      <div class="page-head">
        <h1 data-i18n="{{ title_key }}">{{ title }}</h1>
        {% block lead %}{% endblock %}
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/lib/echarts.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
